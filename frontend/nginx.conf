# Securelytix frontend: statik SPA + API proxy
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: /gecmis gibi rotalar doğrudan açıldığında dosya
    # bulunamaz; index.html dönülür, yönlendirmeyi React Router yapar
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api istekleri backend container'ına yönlendirilir.
    # Tarayıcı her şeyi aynı origin'den (localhost:3000) gördüğü için
    # CORS'a hiç gerek kalmaz.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
