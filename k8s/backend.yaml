# Backend API: Deployment (2 replica) + ClusterIP Service (8080).
# Bağlantı cümlesi ConfigMap parçaları (host/port/db) + Secret (kullanıcı/şifre)
# birleştirilerek kurulur; $(VAR) K8s içinde aynı listede önce tanımlı env'leri açar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: securelytix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: securelytix-backend:local
          imagePullPolicy: IfNotPresent   # yerel build'i kullan, registry'den çekme
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: securelytix-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: securelytix-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: securelytix-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: securelytix-secret, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: securelytix-secret, key: POSTGRES_PASSWORD } }
            - name: ConnectionStrings__DefaultConnection
              value: "Host=$(DB_HOST);Port=$(DB_PORT);Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: GEMINI_API_KEY
              valueFrom: { secretKeyRef: { name: securelytix-secret, key: GEMINI_API_KEY } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: securelytix-secret, key: JWT_SECRET } }
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          # startupProbe: açılışta migration + Postgres bekleme için geniş süre tanır
          startupProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 3
            failureThreshold: 30    # 90sn'ye kadar başlamasına izin ver
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "200Mi" }
            limits: { cpu: "1000m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: securelytix
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
